<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virginia Congressional Districts — Voter Demographics</title>
<script src="https://unpkg.com/d3@7/dist/d3.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #e8e8e8;
  --surface: #f5f5f5;
  --border: #d5d5d5;
  --text: #333333;
  --text-dim: #616161;
  --text-muted: #9e9e9e;
  --water: #c9c9c9;
  --land: #f5f5f5;
  --land-stroke: #bdbdbd;
  --hl: #5c8ab5;
  --hl-stroke: #3a6d96;
  --shadow: rgba(0,0,0,0.06);
  --dem: #2563a8;
  --dem-light: #dbe8f8;
  --dem-bright: #1a4fd6;
  --rep: #c0392b;
  --rep-light: #fce8e6;
  --rep-bright: #d62020;
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

.maps-container {
  height: calc(100vh - 42px);
  display: grid; grid-template-columns: 1fr;
}
.map-panel { position: relative; overflow: hidden; background: var(--water); cursor: crosshair; }
.map-svg { width: 100%; height: 100%; display: block; }
.district-path { stroke-linejoin: round; stroke-linecap: round; transition: fill 0.15s, stroke 0.15s; }

.map-title {
  position: absolute; top: 0; left: 0; right: 0; z-index: 20;
  text-align: center; padding: 14px 8px 0; pointer-events: none;
}
.map-title .label {
  font-family: 'Lora', serif; font-size: 1.5rem; font-weight: 700;
  color: var(--text); line-height: 1.2;
  text-shadow: 0 1px 3px rgba(245,245,245,0.9);
}
.map-title .sub {
  font-size: 0.72rem; color: var(--text-muted); margin-top: 2px;
  text-shadow: 0 1px 2px rgba(245,245,245,0.9);
}

/* ── Lens overlay ── */
.lens-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 15; pointer-events: all; cursor: crosshair;
}
.lens-ring { fill: none; stroke: #3a6d96; stroke-width: 1.8; opacity: 0.85; }
.lens-crosshair { stroke: rgba(58,109,150,0.4); stroke-width: 1; stroke-dasharray: 3,4; }

/* ── Popup card ── */
.lens-card {
  position: fixed;
  z-index: 9999;
  background: white;
  border: 1px solid var(--border);
  border-radius: 9px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  padding: 12px 14px;
  width: min(230px, calc(100vw - 20px));
  display: none;
  pointer-events: none;
  font-family: 'Inter', sans-serif;
  /* scroll if card is taller than viewport */
  max-height: calc(100vh - 20px);
  overflow-y: auto;
}
.lens-card.show { display: block; }

.lc-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
.lc-title { font-family: 'Lora', serif; font-size: 0.92rem; font-weight: 700; color: var(--text); }
.lc-pop { font-size: 0.62rem; color: var(--text-muted); }

.lc-sec {
  font-size: 0.6rem; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px; margin-top: 2px;
}
.race-row { display: flex; align-items: center; gap: 5px; margin-bottom: 3px; }
.race-lbl { font-size: 0.62rem; width: 54px; flex-shrink: 0; color: var(--text); }
.race-track { flex: 1; height: 6px; background: #eee; border-radius: 3px; overflow: hidden; }
.race-fill { height: 100%; border-radius: 3px; }
.race-pct { font-size: 0.6rem; color: var(--text-muted); width: 30px; text-align: right; flex-shrink: 0; }

.lc-divider { height: 1px; background: #e8e8e8; margin: 7px 0; }

.elex-label {
  font-size: 0.6rem; font-weight: 700; color: var(--text-muted);
  text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 4px;
}
.elex-row { display: flex; gap: 4px; margin-bottom: 5px; }
.vote-box {
  flex: 1; border-radius: 4px; padding: 4px 5px; text-align: center;
}
.vote-box.d { background: var(--dem-light); }
.vote-box.r { background: var(--rep-light); }
.vote-box.d.winner { background: var(--dem-bright); }
.vote-box.r.winner { background: var(--rep-bright); }
.vote-box.d.winner .vb-party,
.vote-box.d.winner .vb-votes,
.vote-box.d.winner .vb-pct { color: white !important; }
.vote-box.r.winner .vb-party,
.vote-box.r.winner .vb-votes,
.vote-box.r.winner .vb-pct { color: white !important; }
.vb-party { font-size: 0.58rem; font-weight: 700; letter-spacing: 0.04em; }
.vote-box.d .vb-party { color: var(--dem); }
.vote-box.r .vb-party { color: var(--rep); }
.vb-votes { font-size: 0.68rem; font-weight: 600; color: var(--text); }
.vb-pct { font-size: 0.58rem; color: var(--text-muted); }

/* ── Zoom controls ── */
.zoom-ctrl {
  position: absolute; bottom: 14px; left: 10px; z-index: 20;
  display: flex; flex-direction: column; gap: 1px;
}
.zoom-btn {
  width: 30px; height: 30px; background: #fff; border: 1px solid var(--border);
  border-radius: 4px; cursor: pointer; font-size: 1.1rem; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 3px var(--shadow); transition: all 0.12s; user-select: none;
}
.zoom-btn:hover { color: var(--hl); border-color: var(--hl); }

/* District labels — bolder */
.district-label {
  font-family: 'Inter', sans-serif; font-weight: 800;
  fill: #444; pointer-events: none;
  text-anchor: middle; dominant-baseline: central;
  paint-order: stroke; stroke: rgba(245,245,245,0.95); stroke-width: 4px;
}
.city-label {
  font-size: 8px; font-family: 'Inter', sans-serif; font-weight: 600;
  fill: #757575; pointer-events: none; text-anchor: middle;
  paint-order: stroke; stroke: rgba(245,245,245,0.85); stroke-width: 2.5px;
  letter-spacing: 0.03em;
}
.city-dot { fill: #757575; stroke: rgba(245,245,245,0.8); stroke-width: 1.2; pointer-events: none; }

/* ── Status bar ── */
.status-bar {
  height: 42px; background: #fff; border-top: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 16px; gap: 10px;
  box-shadow: 0 -1px 3px var(--shadow); overflow-x: auto;
}
.s-hint { font-size: 0.7rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; }
.s-space { flex: 1; min-width: 4px; }
.chips { display: flex; gap: 3px; flex-shrink: 0; }
.chip {
  font-size: 0.7rem; padding: 3px 9px; border-radius: 4px; border: 1.5px solid var(--border);
  color: var(--text-muted); cursor: pointer; transition: all 0.12s; user-select: none;
  font-weight: 600; white-space: nowrap; background: #fff;
}
.chip:hover { border-color: var(--hl); color: var(--hl); }
.chip.active { background: var(--hl); border-color: var(--hl); color: white; }

.map-tooltip {
  position: fixed; z-index: 200; background: rgba(255,255,255,0.97);
  border: 1px solid var(--border); border-radius: 4px; padding: 5px 11px;
  font-size: 0.74rem; box-shadow: 0 2px 6px var(--shadow);
  pointer-events: none; display: none; white-space: nowrap; font-weight: 500;
  color: var(--text);
}

@media (max-width: 768px) {
  .maps-container { height: calc(100vh - 38px); }
  .map-title .label { font-size: 1.2rem; }
  .map-title .sub { font-size: 0.65rem; }
  .zoom-ctrl { bottom: 8px; left: 6px; }
  .zoom-btn { width: 26px; height: 26px; font-size: 0.95rem; }
  .status-bar { height: 38px; padding: 0 10px; gap: 6px; }
  .chip { font-size: 0.65rem; padding: 2px 7px; }
  .lens-card { padding: 10px 12px; }
  .s-hint { display: none; }
}
@media (max-width: 420px) {
  .map-title .label { font-size: 1.05rem; }
  .chip { font-size: 0.6rem; padding: 2px 5px; }
}
</style>
</head>
<body>

<div class="maps-container">
  <div class="map-panel" id="panel-current">
    <div class="map-title">
      <div class="label">Virginia Congressional Districts</div>
      <div class="sub">119th Congress · Hover to explore voter data</div>
    </div>
    <svg class="map-svg" id="svg-current"></svg>
    <svg class="lens-overlay" id="lens-svg"></svg>
    <div class="lens-card" id="lens-card"></div>
    <div class="zoom-ctrl">
      <div class="zoom-btn" onclick="zoomMap('current',1.3)">+</div>
      <div class="zoom-btn" onclick="zoomMap('current',1/1.3)">−</div>
      <div class="zoom-btn" onclick="resetZoom('current')">⟳</div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span class="s-hint">Hover map to explore · Scroll to zoom</span>
  <div class="s-space"></div>
  <div class="chips" id="chips"></div>
</div>

<div class="map-tooltip" id="tooltip"></div>

const HL_FILL = '#5c8ab5', HL_STROKE = '#3a6d96', HL_OPACITY = 0.72;
const DEF_FILL = '#e0e0e0', DEF_STROKE = '#bdbdbd', DEF_OPACITY = 0.85;

const RACE_COLORS = {
  white:'#5080b8', black:'#c04040', hispanic:'#3a9a58',
  asian:'#c07818', other:'#806890'
};

const LENS_R = 50; // small lens

const maps = {};
let selectedId = null;

function getLabelSize() {
  const w = window.innerWidth;
  return w <= 420 ? 18 : w <= 768 ? 20 : 17;
}

function initMap(side, geoData) {
  const svgEl = document.getElementById(`svg-${side}`);
  const svg = d3.select(svgEl);
  const W = svgEl.clientWidth, H = svgEl.clientHeight;
  const projection = d3.geoMercator().fitSize([W, H], geoData);
  const path = d3.geoPath().projection(projection);

  svg.append('rect').attr('width', W).attr('height', H).attr('fill', '#c9c9c9');

  const g = svg.append('g').attr('class', 'districts-g');
  g.selectAll('path').data(geoData.features).join('path')
    .attr('class', 'district-path').attr('d', path)
    .attr('fill', DEF_FILL).attr('fill-opacity', DEF_OPACITY).attr('stroke', DEF_STROKE).attr('stroke-width', 1.2)
    .on('mouseover', function(ev, d) {
      const id = d.properties.district;
      if (id !== selectedId) d3.select(this).attr('fill', '#d0d0d0').attr('stroke', '#999').attr('stroke-width', 1.8);
      showTooltip(ev, `District ${parseInt(id)}`);
    })
    .on('mousemove', ev => moveTooltip(ev))
    .on('mouseout', function(ev, d) {
      const id = d.properties.district;
      if (id !== selectedId) d3.select(this).attr('fill', DEF_FILL).attr('stroke', DEF_STROKE).attr('stroke-width', 1.2);
      hideTooltip();
    })
    .on('click', function(ev, d) { ev.stopPropagation(); selectDistrict(d.properties.district); });

  g.selectAll('text').data(geoData.features).join('text')
    .attr('class', 'district-label')
    .attr('x', d => path.centroid(d)[0]).attr('y', d => path.centroid(d)[1])
    .attr('font-size', getLabelSize() + 'px')
    .text(d => parseInt(d.properties.district));

  const cityG = svg.append('g').attr('class', 'cities-g');
  VA_CITIES.forEach(([name, lng, lat, pri]) => {
    const [cx, cy] = projection([lng, lat]);
    if (isNaN(cx) || isNaN(cy)) return;
    cityG.append('circle').attr('class', 'city-dot').attr('cx', cx).attr('cy', cy).attr('r', 1.6).attr('data-pri', pri);
    cityG.append('text').attr('class', 'city-label').attr('x', cx).attr('y', cy - 6).attr('data-pri', pri).text(name);
  });

  const zoom = d3.zoom().scaleExtent([0.8, 12]).on('zoom', ev => {
    g.attr('transform', ev.transform);
    cityG.attr('transform', ev.transform);
    syncZoom(side, ev.transform);
    resolveOverlaps(side, ev.transform.k);
  });
  svg.call(zoom);
  svg.on('click.bg', () => { if (selectedId) selectDistrict(selectedId); });

  maps[side] = { svg, svgEl, g, cityG, projection, path, zoom, W, H, geoData };
}

function resolveOverlaps(side, k) {
  if (!maps[side]) return;
  const labels = maps[side].cityG.selectAll('.city-label').nodes();
  const dots = maps[side].cityG.selectAll('.city-dot').nodes();
  // Priority threshold: at default zoom (k~1), only pri 1 shows; as you zoom, more appear
  const priThresh = k < 1.5 ? 1 : k < 3 ? 2 : 3;
  const placed = [];
  const pad = 4;

  labels.forEach((el, i) => {
    const pri = +el.getAttribute('data-pri');
    const dot = dots[i];
    if (pri > priThresh) {
      el.style.display = 'none';
      if (dot) dot.style.display = 'none';
      return;
    }
    // Get bounding box in SVG coords (before transform)
    const x = +el.getAttribute('x');
    const y = +el.getAttribute('y');
    const text = el.textContent;
    const charW = 4.5 / k; // approximate char width at current zoom
    const w = text.length * charW;
    const h = 8 / k;
    const box = { x: x - w/2 - pad/k, y: y - h - pad/k, w: w + 2*pad/k, h: h + 2*pad/k };

    let dominated = false;
    for (const p of placed) {
      if (box.x < p.x + p.w && box.x + box.w > p.x && box.y < p.y + p.h && box.y + box.h > p.y) {
        dominated = true;
        break;
      }
    }
    if (dominated) {
      el.style.display = 'none';
      if (dot) dot.style.display = 'none';
    } else {
      el.style.display = '';
      if (dot) dot.style.display = '';
      placed.push(box);
    }
  });
}

let syncingZoom = false;
function syncZoom(from, t) {
  if (syncingZoom) return; syncingZoom = true;
  const to = null; // single map, no sync
  // no sync needed
  syncingZoom = false;
}
function zoomMap(s, f) { if (!maps[s]) return; maps[s].svg.transition().duration(250).call(maps[s].zoom.scaleBy, f, [maps[s].W/2, maps[s].H/2]); }
function resetZoom(s) { if (!maps[s]) return; maps[s].svg.transition().duration(300).call(maps[s].zoom.transform, d3.zoomIdentity); }

function selectDistrict(id) {
  ['current'].forEach(s => {
    if (!maps[s]) return;
    maps[s].g.selectAll('path').each(function(d) {
      const did = d.properties.district;
      if (did === id) {
        d3.select(this).attr('fill', HL_FILL).attr('stroke', HL_STROKE)
          .attr('fill-opacity', HL_OPACITY).attr('stroke-width', 2.2).raise();
      } else if (did === selectedId) {
        d3.select(this).attr('fill', DEF_FILL).attr('stroke', DEF_STROKE)
          .attr('fill-opacity', DEF_OPACITY).attr('stroke-width', 1.2);
      }
    });
  });
  document.querySelector(`.chip[data-id="${selectedId}"]`)?.classList.remove('active');
  if (selectedId === id) { selectedId = null; document.getElementById('sel-label').textContent = ''; return; }
  selectedId = id;
  document.querySelector(`.chip[data-id="${id}"]`)?.classList.add('active');
  document.getElementById('sel-label').textContent = `District ${parseInt(id)} selected`;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && selectedId) selectDistrict(selectedId); });

const tooltip = document.getElementById('tooltip');
function showTooltip(e, t) { tooltip.textContent = t; tooltip.style.display = 'block'; moveTooltip(e); }
function moveTooltip(e) { tooltip.style.left = (e.clientX+12)+'px'; tooltip.style.top = (e.clientY-28)+'px'; }
function hideTooltip() { tooltip.style.display = 'none'; }

// ── Lens ──────────────────────────────────────────────────────────────────────
function drawLens(x, y, W, H) {
  const lsvg = d3.select('#lens-svg');
  lsvg.selectAll('*').remove();
  const defs = lsvg.append('defs');
  defs.append('mask').attr('id','lmask')
    .call(m => {
      m.append('rect').attr('width',W).attr('height',H).attr('fill','white');
      m.append('circle').attr('cx',x).attr('cy',y).attr('r',LENS_R).attr('fill','black');
    });
  lsvg.append('rect').attr('width',W).attr('height',H)
    .attr('fill','rgba(210,205,195,0.4)').attr('mask','url(#lmask)');
  lsvg.append('circle').attr('class','lens-ring').attr('cx',x).attr('cy',y).attr('r',LENS_R);
  lsvg.append('line').attr('class','lens-crosshair').attr('x1',x-LENS_R+8).attr('y1',y).attr('x2',x+LENS_R-8).attr('y2',y);
  lsvg.append('line').attr('class','lens-crosshair').attr('x1',x).attr('y1',y-LENS_R+8).attr('x2',x).attr('y2',y+LENS_R-8);
}

function voteRow(d, dk, rk, label) {
  const dv=d[dk], rv=d[rk], tot=dv+rv;
  const dp=(dv/tot*100).toFixed(1), rp=(rv/tot*100).toFixed(1);
  const dw = dv > rv;
  return `
  <div class="elex-label">${label}</div>
  <div class="elex-row">
    <div class="vote-box d${dw?' winner':''}">
      <div class="vb-party">DEM</div>
      <div class="vb-votes">${dv.toLocaleString()}</div>
      <div class="vb-pct">${dp}%</div>
    </div>
    <div class="vote-box r${!dw?' winner':''}">
      <div class="vb-party">REP</div>
      <div class="vb-votes">${rv.toLocaleString()}</div>
      <div class="vb-pct">${rp}%</div>
    </div>
  </div>`;
}

function buildCard(id) {
  const d = DIST_DATA[id]; if (!d) return '';
  const races = [
    ['White',d.white,RACE_COLORS.white],['Black',d.black,RACE_COLORS.black],
    ['Hispanic',d.hispanic,RACE_COLORS.hispanic],['Asian',d.asian,RACE_COLORS.asian],
    ['Other',d.other,RACE_COLORS.other]
  ];
  return `
    <div class="lc-head">
      <span class="lc-title">District ${parseInt(id)}</span>
      <span class="lc-pop">Pop: ${d.total.toLocaleString()}</span>
    </div>
    <div class="lc-sec">Race</div>
    ${races.map(([l,p,c])=>`
    <div class="race-row">
      <span class="race-lbl">${l}</span>
      <div class="race-track"><div class="race-fill" style="width:${p}%;background:${c}"></div></div>
      <span class="race-pct">${p.toFixed(1)}%</span>
    </div>`).join('')}
    <div class="lc-divider"></div>
    ${voteRow(d,'gov25dem','gov25rep','2025 Governor')}
    ${voteRow(d,'pres24dem','pres24rep','2024 President')}
    ${voteRow(d,'ussen24dem','ussen24rep','2024 Senate')}
    ${voteRow(d,'pres20dem','pres20rep','2020 President')}`;
}

function positionCard(card, clientX, clientY) {
  const cw = card.offsetWidth || 230;
  const ch = card.offsetHeight || 400;
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const mg = 10;
  const r  = LENS_R + 14;

  // Prefer right of cursor, else left
  let cx = clientX + r;
  if (cx + cw > vw - mg) cx = clientX - r - cw;
  // Clamp horizontally
  cx = Math.max(mg, Math.min(cx, vw - cw - mg));

  // Prefer below cursor top-aligned, else above
  let cy = clientY - 20;
  if (cy + ch > vh - mg) cy = vh - ch - mg;
  cy = Math.max(mg, cy);

  card.style.left = cx + 'px';
  card.style.top  = cy + 'px';
}

function setupLens() {
  const overlay = document.getElementById('lens-svg');
  const card    = document.getElementById('lens-card');
  let lastId = null;

  function onMove(clientX, clientY) {
    const panel = document.getElementById('panel-current');
    const rect  = panel.getBoundingClientRect();
    const x = clientX - rect.left;
    const y = clientY - rect.top;

    drawLens(x, y, rect.width, rect.height);

    const m = maps['current']; if (!m) return;
    const transform = d3.zoomTransform(m.svgEl);
    const coords = m.projection.invert(transform.invert([x, y]));

    let found = null;
    if (coords) {
      for (const feat of m.geoData.features) {
        if (d3.geoContains(feat, coords)) { found = feat.properties.district; break; }
      }
    }

    if (found !== lastId) {
      lastId = found;
      if (found) {
        card.innerHTML = buildCard(found);
        card.classList.add('show');
      } else {
        card.classList.remove('show');
      }
    }
    if (found) positionCard(card, clientX, clientY);
  }

  // Mouse
  overlay.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
  overlay.addEventListener('mouseleave', () => {
    d3.select('#lens-svg').selectAll('*').remove();
    card.classList.remove('show');
    lastId = null;
  });

  // Touch
  overlay.addEventListener('touchmove', e => {
    e.preventDefault();
    const t = e.touches[0];
    onMove(t.clientX, t.clientY);
  }, { passive: false });
  overlay.addEventListener('touchend', () => {
    d3.select('#lens-svg').selectAll('*').remove();
    card.classList.remove('show');
    lastId = null;
  });
}
